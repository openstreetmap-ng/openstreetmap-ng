<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OpenStreetMap-NG Founder badge</title>
  <desc id="desc">A circular OpenStreetMap-NG Founder badge with a folded green map, NG monogram, gold founder ring, and bottom ribbon.</desc>
  <defs>
    <linearGradient id="outer" x1="70" y1="42" x2="442" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1a8" />
      <stop offset="0.46" stop-color="#d8a53b" />
      <stop offset="1" stop-color="#8b5f16" />
    </linearGradient>
    <linearGradient id="inner" x1="112" y1="94" x2="408" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fd26f" />
      <stop offset="1" stop-color="#326f46" />
    </linearGradient>
    <linearGradient id="foldA" x1="144" y1="150" x2="368" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7f4b7" />
      <stop offset="1" stop-color="#68a957" />
    </linearGradient>
    <linearGradient id="foldB" x1="352" y1="150" x2="152" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7e494" />
      <stop offset="1" stop-color="#2f7948" />
    </linearGradient>
    <linearGradient id="ribbon" x1="103" y1="352" x2="409" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b5f3a" />
      <stop offset="0.52" stop-color="#277547" />
      <stop offset="1" stop-color="#16452e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#102115" flood-opacity="0.32" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="238" fill="url(#outer)" />
  <circle cx="256" cy="256" r="217" fill="#f8f6e9" />
  <circle cx="256" cy="256" r="199" fill="url(#inner)" />

  <g filter="url(#shadow)">
    <path d="M122 132h268c11 0 20 9 20 20v212c0 11-9 20-20 20H122c-11 0-20-9-20-20V152c0-11 9-20 20-20Z" fill="#f7fbf1" />
    <path d="M122 132h92v252h-92c-11 0-20-9-20-20V152c0-11 9-20 20-20Z" fill="url(#foldA)" />
    <path d="M214 132h88v252h-88z" fill="#75b75e" />
    <path d="M302 132h88c11 0 20 9 20 20v212c0 11-9 20-20 20h-88z" fill="url(#foldB)" />
    <path d="M214 132v252M302 132v252" fill="none" stroke="#2f6d45" stroke-width="8" stroke-linecap="round" opacity="0.38" />
    <path d="M137 319c37-21 63-18 92 7 33 29 73 35 125-3" fill="none" stroke="#1e6a43" stroke-width="13" stroke-linecap="round" opacity="0.55" />
    <path d="M142 211c42 17 74 13 107-14 37-31 80-27 122 9" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.58" />
    <path d="M160 159c-5 62 8 109 34 158M346 161c-22 54-30 112-23 176" fill="none" stroke="#f3ffe9" stroke-width="6" stroke-linecap="round" opacity="0.55" />
  </g>

  <g aria-label="NG">
    <text x="256" y="287" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="118" font-weight="850" fill="#103822" stroke="#f7fbf1" stroke-width="8" paint-order="stroke">NG</text>
  </g>

  <path d="M92 363c0-13 11-24 24-24h280c13 0 24 11 24 24v48c0 13-11 24-24 24H116c-13 0-24-11-24-24z" fill="url(#ribbon)" />
  <path d="M116 339h280c13 0 24 11 24 24v8H92v-8c0-13 11-24 24-24Z" fill="#ffffff" opacity="0.12" />
  <text x="256" y="402" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="4" fill="#fff7cf">FOUNDER</text>

  <path d="M110 94a221 221 0 0 1 292 0" fill="none" stroke="#8a6119" stroke-width="12" stroke-linecap="round" opacity="0.55" />
  <path d="M92 110a232 232 0 0 0-47 79M420 110a232 232 0 0 1 47 79" fill="none" stroke="#fff0a4" stroke-width="8" stroke-linecap="round" opacity="0.7" />
</svg>
