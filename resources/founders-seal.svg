    <path d="M282 118c48-6 78 19 75 55-3 45-67 57-101 34-34-24-19-84 26-89z" fill="#7cc96d" fill-opacity="0.3"/>
    <path d="M212 245c36-8 67 9 70 37 4 35-42 51-75 35-33-16-33-63 5-72z" fill="#7cc96d" fill-opacity="0.25"/>
