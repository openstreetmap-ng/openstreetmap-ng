syntax = "proto3";

package note;

import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

enum Status {
  open = 0;
  closed = 1;
  hidden = 2;
}

message UserPage {
  User user = 1 [(buf.validate.field).required = true];
}

service Service {
  rpc GetMap(GetMapRequest) returns (GetMapResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc Get(GetRequest) returns (GetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetUserPage(GetUserPageRequest) returns (GetUserPageResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc Create(CreateRequest) returns (CreateResponse) {}

  rpc AddComment(AddCommentRequest) returns (AddCommentResponse) {}

  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (UpdateSubscriptionResponse) {
    option idempotency_level = IDEMPOTENT;
  }
}

message GetMapRequest {
  Bounds bbox = 1 [(buf.validate.field).required = true];
}

message GetMapResponse {
  message Note {
    uint64 id = 1;
    LonLat location = 2 [(buf.validate.field).required = true];
    string body = 3;
    Status status = 4;
  }

  repeated Note notes = 1;
}

message CreateRequest {
  LonLat location = 1 [(buf.validate.field).required = true];
  string body = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2000
  }];
}

message CreateResponse {
  uint64 id = 1;
}

message GetRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}

message GetResponse {
  Data note = 1 [(buf.validate.field).required = true];
}

message GetCommentsRequest {
  StandardPaginationRequest state = 1;
  uint64 id = 2 [(buf.validate.field).uint64.gt = 0];
}

message GetUserPageRequest {
  enum StatusFilter {
    any = 0;
    open = 1;
    closed = 2;
  }

  StandardPaginationRequest state = 1;
  uint64 user_id = 2 [(buf.validate.field).uint64.gt = 0];
  bool commented = 3;
  StatusFilter status = 4 [(buf.validate.field).enum.defined_only = true];
}

message GetUserPageResponse {
  message Summary {
    uint64 id = 1;
    Status status = 2;
    uint64 created_at = 3;
    optional User created_by = 4;
    string body = 5;
    uint64 updated_at = 6;
    uint32 num_comments = 7;
  }

  StandardPaginationState state = 1 [(buf.validate.field).required = true];
  repeated Summary notes = 2;
}

message GetCommentsResponse {
  message Comment {
    enum Event {
      opened = 0;
      closed = 1;
      reopened = 2;
      commented = 3;
      hidden = 4;
    }

    optional User user = 1;
    Event event = 2;
    uint64 created_at = 3;
    string body_rich = 4;
  }

  StandardPaginationState state = 1 [(buf.validate.field).required = true];
  repeated Comment comments = 2;
}

message AddCommentRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  GetCommentsResponse.Comment.Event event = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string body = 3 [(buf.validate.field).string.max_len = 2000];
}

message AddCommentResponse {
  Data note = 1 [(buf.validate.field).required = true];
  GetCommentsResponse comments = 2 [(buf.validate.field).required = true];
}

message UpdateSubscriptionRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  bool is_subscribed = 2;
}

message UpdateSubscriptionResponse {
  bool is_subscribed = 1;
}

message Data {
  message Header {
    optional User user = 1;
    uint64 created_at = 2;
    string body_rich = 3;
  }

  uint64 id = 1;
  LonLat location = 2 [(buf.validate.field).required = true];
  Status status = 3;
  Header header = 4 [(buf.validate.field).required = true];
  bool is_subscribed = 5;
  optional uint32 disappear_days = 6;
}
