syntax = "proto3";

package reset_password;

import "app/models/proto/auth.proto";
import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

message Page {
  message Confirm {
    string token = 1 [(buf.validate.field).string.min_len = 1];
    User profile = 2 [(buf.validate.field).required = true];
  }

  // Pre-fill and lock the email field when the viewer is already signed in.
  optional string current_email = 1;
  // Token-completion flow when the user has clicked through a valid reset email.
  // When set, render the new-password form for the given profile.
  optional Confirm confirm = 2;
}

service Service {
  rpc Request(RequestRequest) returns (RequestResponse) {}
  rpc Reset(ResetRequest) returns (ResetResponse) {}
}

message RequestRequest {
  string email = 1 [(buf.validate.field).string = {
    email: true
    min_len: 5
    max_len: 254
  }];
}

message RequestResponse {
  StandardFeedbackDetail feedback = 1;
}

message ResetRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
  auth.TransmitUserPassword new_password = 2 [(buf.validate.field).required = true];
}

message ResetResponse {
  StandardFeedbackDetail feedback = 1;
}
