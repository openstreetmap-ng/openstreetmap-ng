syntax = "proto3";

package message;

import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

message IndexPage {
  bool inbox = 1;
}

message NewPage {
  string recipients = 1;
  string subject = 2;
  string body = 3;
}

service Service {
  rpc GetPage(GetPageRequest) returns (GetPageResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc UpdateReadState(UpdateReadStateRequest) returns (UpdateReadStateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Send(SendRequest) returns (SendResponse) {}
}

message GetPageRequest {
  StandardPaginationRequest state = 1;
  bool inbox = 2;
}

message GetPageResponse {
  message Summary {
    uint64 id = 1;
    optional User sender = 2;
    repeated User recipients = 3;
    uint32 recipients_count = 4;
    bool unread = 5;
    uint64 created_at = 6;
    string subject = 7;
    string body_preview = 8;
  }

  StandardPaginationState state = 1 [(buf.validate.field).required = true];
  repeated Summary messages = 2;
}

message GetRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}

message GetResponse {
  bool was_unread = 1;
  User sender = 2 [(buf.validate.field).required = true];
  repeated User recipients = 3;
  bool is_recipient = 4;
  uint64 created_at = 5;
  string subject = 6;
  string body_rich = 7;
}

message UpdateReadStateRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  bool read = 2;
}

message UpdateReadStateResponse {
  bool updated = 1;
}

message DeleteRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}

message DeleteResponse {}

message SendRequest {
  string subject = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  string body = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50000
  }];
  repeated string recipient = 3 [(buf.validate.field).repeated = {
    unique: true
    min_items: 1
    max_items: 5
    items: {
      string: {
        min_len: 1
        max_len: 255
      }
    }
  }];
}

message SendResponse {
  string redirect_url = 1;
}
