syntax = "proto3";

package settings_security;

import "app/models/proto/auth.proto";
import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

message Page {
  message Session {
    message Activity {
      uint64 created_at = 1;
      bytes ip = 2;
      optional string user_agent = 3;
    }

    uint64 id = 1;
    uint64 authorized_at = 2;
    optional Activity last_activity = 3;
    bool current = 4;
  }

  string email = 1;
  repeated Passkey passkeys = 2;
  optional uint64 totp_created_at = 3;
  RecoveryStatus recovery_codes_status = 4 [(buf.validate.field).required = true];
  repeated Session active_sessions = 5;
}

service Service {
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {}
  rpc SetupTotp(SetupTotpRequest) returns (SetupTotpResponse) {}
  rpc DisableTotp(DisableTotpRequest) returns (DisableTotpResponse) {}
  rpc RegisterPasskey(RegisterPasskeyRequest) returns (RegisterPasskeyResponse) {}
  rpc RenamePasskey(RenamePasskeyRequest) returns (RenamePasskeyResponse) {}
  rpc RemovePasskey(RemovePasskeyRequest) returns (RemovePasskeyResponse) {}
  rpc GenerateRecoveryCodes(GenerateRecoveryCodesRequest) returns (GenerateRecoveryCodesResponse) {}
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse) {}
}

message ChangePasswordRequest {
  auth.TransmitUserPassword old_password = 1 [(buf.validate.field).required = true];
  auth.TransmitUserPassword new_password = 2 [(buf.validate.field).required = true];
  bool revoke_other_sessions = 3;
}

message ChangePasswordResponse {
  StandardFeedbackDetail feedback = 1;
}

message SetupTotpRequest {
  string secret = 1 [(buf.validate.field).string.min_len = 1];
  uint32 digits = 2 [(buf.validate.field).uint32 = {
    in: [
      6,
      8
    ]
  }];
  string totp_code = 3 [(buf.validate.field).string.pattern = "^(?:[0-9]{6}|[0-9]{8})$"];
}

message SetupTotpResponse {
  uint64 created_at = 1;
}

message DisableTotpRequest {
  auth.TransmitUserPassword password = 1 [(buf.validate.field).required = true];
}

message DisableTotpResponse {}

message RegisterPasskeyRequest {
  auth.PasskeyRegistration registration = 1 [(buf.validate.field).required = true];
}

message RegisterPasskeyResponse {
  repeated Passkey passkeys = 1;
}

message RenamePasskeyRequest {
  bytes credential_id = 1 [(buf.validate.field).bytes.min_len = 1];
  string name = 2 [(buf.validate.field).string.max_len = 50];
}

message RenamePasskeyResponse {
  string name = 1;
}

message RemovePasskeyRequest {
  auth.TransmitUserPassword password = 1 [(buf.validate.field).required = true];
  bytes credential_id = 2 [(buf.validate.field).bytes.min_len = 1];
}

message RemovePasskeyResponse {
  repeated Passkey passkeys = 1;
}

message GenerateRecoveryCodesRequest {
  auth.TransmitUserPassword password = 1 [(buf.validate.field).required = true];
}

message GenerateRecoveryCodesResponse {
  repeated string codes = 1;
  RecoveryStatus status = 2 [(buf.validate.field).required = true];
}

message RevokeTokenRequest {
  uint64 token_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message RevokeTokenResponse {}

message Passkey {
  bytes credential_id = 1;
  string name = 2;
  repeated string icons = 3;
  uint64 created_at = 4;
}

message RecoveryStatus {
  uint32 num_remaining = 1;
  optional uint64 created_at = 2;
}
