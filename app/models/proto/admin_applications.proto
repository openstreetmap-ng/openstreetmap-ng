syntax = "proto3";

package admin_applications;

import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

message Page {}

service Service {
  rpc List(ListRequest) returns (ListResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc ExportIds(ExportIdsRequest) returns (ExportIdsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message ListRequest {
  optional StandardPaginationRequest state = 1;
  Filters filters = 2 [(buf.validate.field).required = true];
}

message ListResponse {
  message Entry {
    uint64 id = 1;
    string name = 2;
    string avatar_url = 3;
    string client_id = 4;
    bool confidential = 5;
    repeated string redirect_uris = 6;
    repeated Scope scopes = 7;
    optional User owner = 8;
    uint32 user_count = 9;
    uint64 created_at = 10;
    repeated IpCount ip_counts = 11;
  }

  StandardPaginationState state = 1 [(buf.validate.field).required = true];
  repeated Entry entries = 2;
}

message ExportIdsRequest {
  Filters filters = 1 [(buf.validate.field).required = true];
}

message ExportIdsResponse {
  repeated uint64 ids = 1;
}

message Filters {
  enum Sort {
    created_desc = 0;
    created_asc = 1;
  }

  optional string search = 1 [(buf.validate.field).string.min_len = 1];
  optional string owner = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  optional string interacted_user = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  optional uint64 created_after = 4;
  optional uint64 created_before = 5;
  Sort sort = 6 [(buf.validate.field).enum.defined_only = true];
}
