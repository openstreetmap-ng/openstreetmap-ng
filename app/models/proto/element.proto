syntax = "proto3";

package element;

import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

service Service {
  rpc GetMap(GetMapRequest) returns (GetMapResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc Get(GetRequest) returns (GetResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message GetMapRequest {
  Bounds bbox = 1 [(buf.validate.field).required = true];
  uint32 limit = 2;
}

message GetMapResponse {
  RenderData render = 1 [(buf.validate.field).required = true];
  bool too_much_data = 2;
}

message GetRequest {
  oneof ref {
    option (buf.validate.oneof).required = true;
    ElementRef element = 1;
    ElementVersionRef version = 2;
  }
}

message GetResponse {
  Data element = 1 [(buf.validate.field).required = true];
}

message GetHistoryRequest {
  StandardPaginationRequest state = 1;
  ElementRef element = 2 [(buf.validate.field).required = true];
  bool tags_diff = 3;
  uint32 page_size = 4;
}

message GetHistoryResponse {
  StandardPaginationState state = 1 [(buf.validate.field).required = true];
  repeated Data elements = 2;
}

message Data {
  message Context {
    message Entry {
      ElementRef ref = 1 [(buf.validate.field).required = true];
      repeated string roles = 2;
      optional string name = 3;
      optional ElementIcon icon = 4;
    }

    repeated Entry members = 1;
    repeated Entry parents = 2;
    RenderData render = 3 [(buf.validate.field).required = true];
  }

  message Changeset {
    uint64 id = 1;
    optional User user = 2;
    uint64 created_at = 3;
    string comment_rich = 4;
  }

  ElementVersionRef ref = 1 [(buf.validate.field).required = true];
  bool visible = 2;
  optional string name = 3;
  optional ElementIcon icon = 4;
  map<string, string> tags = 5;
  Context context = 6 [(buf.validate.field).required = true];
  Changeset changeset = 7 [(buf.validate.field).required = true];
  optional uint64 prev_version = 8;
  optional uint64 next_version = 9;
  optional LonLat location = 10;
  map<string, string> tags_old = 11;
}

message RenderData {
  message Node {
    uint64 id = 1;
    LonLat location = 2 [(buf.validate.field).required = true];
  }

  message Way {
    uint64 id = 1;
    string line = 2;
    bool is_area = 3;
  }

  repeated Node nodes = 1;
  repeated Way ways = 2;
}

// Compact element identity + display chrome used by search and query-features
// for "this is a nearby/matching element with renderable shape".
message NearbyMatch {
  ElementType type = 1 [(buf.validate.field).enum.defined_only = true];
  uint64 id = 2 [(buf.validate.field).uint64.gt = 0];
  string prefix = 3;
  optional string display_name = 4;
  optional ElementIcon icon = 5;
  RenderData render = 6 [(buf.validate.field).required = true];
}
