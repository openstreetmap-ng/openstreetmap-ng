syntax = "proto3";

package profile;

import "app/models/proto/shared.proto";
import "buf/validate/validate.proto";

message Page {
  message ActivityChart {
    uint32 start_day = 1; // Days since Unix epoch (UTC)
    repeated uint32 values = 2;
    float max_activity_clip = 3;
  }

  message FollowState {
    uint64 target_user_id = 1;
    bool is_following = 2;
    bool is_followed_by = 3;
  }

  message ChangesetSummary {
    uint64 id = 1;
    uint64 created_at = 2;
    optional string comment = 3;
    uint32 num_comments = 4;
    uint32 num_create = 5;
    uint32 num_modify = 6;
    uint32 num_delete = 7;
  }

  message NoteSummary {
    uint64 id = 1;
    uint64 created_at = 2;
    uint64 updated_at = 3;
    bool is_closed = 4;
    string body = 5;
    uint32 num_comments = 6;
  }

  message TraceSummary {
    enum Visibility {
      identifiable = 0;
      public = 1;
      trackable = 2;
      private = 3;
    }

    uint64 id = 1;
    uint64 created_at = 2;
    string description = 3;
    repeated string tags = 4;
    Visibility visibility = 5 [(buf.validate.field).enum.defined_only = true];
    uint32 size = 6;
    string line = 7;
  }

  message DiarySummary {
    uint64 id = 1;
    uint64 created_at = 2;
    string title = 3;
    uint32 num_comments = 4;
  }

  User user = 1 [(buf.validate.field).required = true];
  bool is_self = 2;
  bool is_new_user = 3;
  bool is_administrator = 4;
  bool is_moderator = 5;
  optional string background_url = 6;
  uint64 created_at = 7;
  ActivityChart chart = 8 [(buf.validate.field).required = true];
  optional FollowState follow = 9;
  optional string description = 10;
  string description_rich = 11;
  repeated UserSocial socials = 12;
  uint64 changesets_count = 13;
  uint64 changesets_comments_count = 14;
  repeated ChangesetSummary changesets = 15;
  uint64 notes_count = 16;
  uint64 notes_comments_count = 17;
  repeated NoteSummary notes = 18;
  uint64 traces_count = 19;
  repeated TraceSummary traces = 20;
  uint64 diaries_count = 21;
  uint64 diaries_comments_count = 22;
  repeated DiarySummary diaries = 23;
  uint64 groups_count = 24;
}
