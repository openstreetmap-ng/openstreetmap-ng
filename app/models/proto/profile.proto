syntax = "proto3";

package profile;

import "app/models/proto/shared.proto";
import "app/models/proto/trace.proto";
import "buf/validate/validate.proto";

message Page {
  message ActivityChart {
    uint32 start_day = 1; // Days since Unix epoch (UTC)
    repeated uint32 values = 2;
    float max_activity_clip = 3;
  }

  message FollowState {
    uint64 target_user_id = 1;
    bool is_following = 2;
    bool is_followed_by = 3;
  }

  message ChangesetSummary {
    uint64 id = 1;
    uint64 created_at = 2;
    optional string comment = 3;
    uint32 num_comments = 4;
    uint32 num_create = 5;
    uint32 num_modify = 6;
    uint32 num_delete = 7;
  }

  message NoteSummary {
    uint64 id = 1;
    uint64 created_at = 2;
    uint64 updated_at = 3;
    bool is_closed = 4;
    string body = 5;
    uint32 num_comments = 6;
  }

  message DiarySummary {
    uint64 id = 1;
    uint64 created_at = 2;
    string title = 3;
    uint32 num_comments = 4;
  }

  User user = 1 [(buf.validate.field).required = true];
  bool is_new_user = 2;
  bool is_administrator = 3;
  bool is_moderator = 4;
  optional string background_url = 5;
  uint64 created_at = 6;
  ActivityChart chart = 7 [(buf.validate.field).required = true];
  optional FollowState follow = 8;
  optional string description = 9;
  string description_rich = 10;
  repeated UserSocial socials = 11;
  uint64 changesets_count = 12;
  uint64 changesets_comments_count = 13;
  repeated ChangesetSummary changesets = 14;
  uint64 notes_count = 15;
  uint64 notes_comments_count = 16;
  repeated NoteSummary notes = 17;
  uint64 traces_count = 18;
  repeated trace.Summary traces = 19;
  uint64 diaries_count = 20;
  uint64 diaries_comments_count = 21;
  repeated DiarySummary diaries = 22;
  uint64 groups_count = 23;
}
